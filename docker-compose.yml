version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: proyecto_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret123
      MYSQL_DATABASE: iluminacion_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/bd.sql:/docker-entrypoint-initdb.d/bd.sql:ro

  backend:
    build:
      context: ./backend
    container_name: proyecto_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: secret123
      DB_NAME: iluminacion_db
      FLASK_ENV: production
    depends_on:
      - db
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000
    container_name: proyecto_frontend
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      - backend

volumes:
  db_data: